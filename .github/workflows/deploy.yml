name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy mediapipe assets to public
        run: |
          mkdir -p public/mediapipe
          for pkg in hands pose drawing_utils camera_utils; do
            cp -r node_modules/@mediapipe/$pkg public/mediapipe/$pkg
          done

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 43.162.124.194 >> ~/.ssh/known_hosts

      - name: Prepare server directory
        run: |
          ssh -i ~/.ssh/id_ed25519 root@43.162.124.194 "mkdir -p /opt/deskbreak"

      - name: Deploy files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            dist/ \
            root@43.162.124.194:/opt/deskbreak/

      - name: Configure Nginx (first deploy only)
        run: |
          ssh -i ~/.ssh/id_ed25519 root@43.162.124.194 python3 << 'PYEOF'
          import subprocess

          CONF = "/www/server/panel/vhost/nginx/deskbreak.onflower.cn.conf"

          with open(CONF) as f:
              content = f.read()

          if "location /deskbreak" in content:
              print("Nginx deskbreak config already exists, skipping")
              raise SystemExit(0)

          DESKBREAK_BLOCK = """
              location /deskbreak {
                  alias /opt/deskbreak/;
                  index index.html;
                  try_files $uri $uri/ /deskbreak/index.html;

                  location = /deskbreak/index.html {
                      alias /opt/deskbreak/index.html;
                      add_header Cache-Control "no-cache, must-revalidate";
                  }

                  location ~* ^/deskbreak/mediapipe/ {
                      alias /opt/deskbreak/mediapipe/;
                      add_header Cache-Control "public, max-age=604800";
                      expires 7d;
                  }
              }

              location ~* /deskbreak/(\\.git|\\.env|\\.htaccess|\\.svn|LICENSE|README\\.md) {
                  deny all;
              }
          """

          last_brace = content.rfind("}")
          with open(CONF, "w") as f:
              f.write(content[:last_brace] + DESKBREAK_BLOCK + "}")

          result = subprocess.run(["nginx", "-t"], capture_output=True, text=True)
          if result.returncode != 0:
              print(result.stderr)
              raise SystemExit("nginx -t failed")

          subprocess.run(["systemctl", "reload", "nginx"], check=True)
          print("Nginx configured and reloaded")
          PYEOF

