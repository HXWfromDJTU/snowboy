name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 43.162.124.194 >> ~/.ssh/known_hosts

      - name: Prepare server directory
        run: |
          ssh -i ~/.ssh/id_ed25519 root@43.162.124.194 "mkdir -p /opt/snowboy"

      - name: Deploy files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            dist/ \
            root@43.162.124.194:/opt/snowboy/

      - name: Configure Nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 root@43.162.124.194 python3 << 'PYEOF'
          import subprocess

          CONF = "/www/server/panel/vhost/nginx/deskbreak.onflower.cn.conf"
          BEGIN_MARKER = "# BEGIN snowboy"
          END_MARKER = "# END snowboy"
          SNOWBOY_BLOCK = """
              # BEGIN snowboy
              location /snowboy {
                  alias /opt/snowboy/;
                  index index.html;
                  try_files $uri $uri/ /snowboy/index.html;

                  # index.html: no cache, always revalidate
                  location = /snowboy/index.html {
                      alias /opt/snowboy/index.html;
                      add_header Cache-Control "no-cache, must-revalidate";
                  }

                  # mediapipe static files: 7-day cache
                  location ~* ^/snowboy/mediapipe/ {
                      alias /opt/snowboy/mediapipe/;
                      add_header Cache-Control "public, max-age=604800";
                      expires 7d;
                  }
              }

              location ~* /snowboy/(\\.git|\\.env|\\.htaccess|\\.svn|LICENSE|README\\.md) {
                  deny all;
              }
              # END snowboy
          """

          def remove_location_block(text, pattern):
              import re
              m = re.search(pattern, text)
              if not m:
                  return text
              brace_pos = text.find('{', m.start())
              if brace_pos == -1:
                  return text
              depth, pos = 1, brace_pos + 1
              while pos < len(text) and depth > 0:
                  if text[pos] == '{': depth += 1
                  elif text[pos] == '}': depth -= 1
                  pos += 1
              line_start = text.rfind('\n', 0, m.start()) + 1
              end = pos + (1 if pos < len(text) and text[pos] == '\n' else 0)
              return text[:line_start] + text[end:]

          with open(CONF, "r") as f:
              content = f.read()

          if BEGIN_MARKER in content and END_MARKER in content:
              # Replace existing marked snowboy block
              start = content.find(BEGIN_MARKER)
              end = content.find(END_MARKER) + len(END_MARKER)
              new_content = content[:start].rstrip() + "\n" + SNOWBOY_BLOCK.strip() + "\n" + content[end:].lstrip()
          else:
              # Remove old unmarked snowboy location blocks, then insert new one
              content = remove_location_block(content, r'location\s+/snowboy\b')
              content = remove_location_block(content, r'location\s+~\*\s+/snowboy/')
              last_brace = content.rfind("}")
              new_content = content[:last_brace] + SNOWBOY_BLOCK + "\n}"

          with open(CONF, "w") as f:
              f.write(new_content)
          print("Nginx config updated")

          result = subprocess.run(["nginx", "-t"], capture_output=True, text=True)
          if result.returncode != 0:
              print(result.stderr)
              raise SystemExit("nginx -t failed")

          subprocess.run(["systemctl", "reload", "nginx"], check=True)
          print("Nginx reloaded")
          PYEOF

