<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeskBreak — 上班族放松操</title>

    <script src="https://unpkg.com/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #080818;
            color: white;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* ── SCREENS ── */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 1;
            transition: opacity 0.4s;
            overflow-y: auto;
            z-index: 10;   /* above glass-overlay (z-6) */
        }
        .screen.hidden { opacity: 0; pointer-events: none; }

        /* ── LOADING ── */
        #screen-loading {
            background: #080818;
            z-index: 100;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(0,229,255,0.2);
            border-top-color: #00e5ff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 0.1em; }

        /* ── WELCOME ── */
        #screen-welcome { gap: 28px; }
        .app-title {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00e5ff, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .app-subtitle { color: rgba(255,255,255,0.45); font-size: 0.9rem; margin-top: -16px; }
        .exercise-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }
        .ex-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .ex-card:hover  { transform: translateY(-3px); background: rgba(255,255,255,0.09); }
        .ex-card:active { transform: translateY(0px); }
        .ex-card-icon { font-size: 1.6rem; }
        .ex-card-name { font-size: 0.85rem; font-weight: 700; }
        .ex-card-reps { font-size: 0.72rem; color: rgba(255,255,255,0.45); }
        .ex-card-hint { font-size: 0.62rem; color: rgba(255,255,255,0.25); margin-top: 2px; letter-spacing: 0.02em; }
        .btn-combo {
            width: 100%;
            max-width: 400px;
            padding: 15px 0;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }
        .btn-combo:hover  { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); }
        .btn-combo:active { transform: scale(0.97); }
        .welcome-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            color: rgba(255,255,255,0.2);
            font-size: 0.72rem;
        }
        .welcome-divider::before,
        .welcome-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .btn-start {
            padding: 16px 48px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #00e5ff, #7c4dff);
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn-start:active { transform: scale(0.96); opacity: 0.85; }

        /* ── EXERCISE ── */
        #screen-exercise { gap: 18px; justify-content: flex-start; padding-top: 32px; }
        .session-dots { display: flex; gap: 10px; }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            transition: background 0.3s;
        }
        .dot.current { background: #00e5ff; box-shadow: 0 0 8px #00e5ff; }
        .dot.done { background: rgba(0,229,255,0.35); }
        .ex-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .ex-icon-wrap {
            font-size: 3.5rem;
            line-height: 1;
        }
        @keyframes anim-fist  { 0%,100%{transform:scale(1)} 50%{transform:scale(0.7)} }
        @keyframes anim-circle { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        @keyframes anim-overhead { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
        @keyframes anim-spread { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
        .anim-fist    { animation: anim-fist    0.8s ease-in-out infinite; }
        .anim-circle  { animation: anim-circle  2s linear infinite; }
        .anim-overhead{ animation: anim-overhead 1.2s ease-in-out infinite; }
        .anim-spread  { animation: anim-spread  1s ease-in-out infinite; }

        .ex-name { font-size: 1.15rem; font-weight: 800; }
        .ex-name-en { font-size: 0.78rem; color: rgba(255,255,255,0.45); }

        /* Progress ring */
        .ring-wrap {
            position: relative;
            width: 190px; height: 190px;
            cursor: pointer;
            user-select: none;
        }
        .ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
        .ring-bg { stroke: rgba(255,255,255,0.08); }
        .ring-fg {
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1), stroke 0.4s;
        }
        .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .rep-count {
            font-size: 3.2rem;
            font-weight: 900;
            line-height: 1;
            transition: color 0.4s;
        }
        @keyframes pop { 0%{transform:scale(1)} 30%{transform:scale(1.35)} 100%{transform:scale(1)} }
        .pop { animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
        .rep-goal { font-size: 0.8rem; color: rgba(255,255,255,0.4); }
        .tap-hint { font-size: 0.65rem; color: rgba(255,255,255,0.25); margin-top: 4px; text-align: center; }

        .tip-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
            text-align: center;
            max-width: 300px;
        }
        .hand-status {
            font-size: 0.78rem;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .hand-ok   { background: rgba(76,175,80,0.2);  color: #4caf50; border: 1px solid rgba(76,175,80,0.4); }
        .hand-half { background: rgba(255,193,7,0.15); color: #ffc107; border: 1px solid rgba(255,193,7,0.35); }
        .hand-no   { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); }
        .next-preview {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            text-align: center;
        }

        /* ── GLASS EXERCISE ── */
        @keyframes anim-wipe { 0%,100%{transform:translateX(-8px)} 50%{transform:translateX(8px)} }
        .anim-wipe { animation: anim-wipe 1.2s ease-in-out infinite; }

        #glass-overlay {
            position: fixed;
            inset: 0;
            z-index: 6;            /* between trail-canvas(5) and screens(10) */
            display: none;
            pointer-events: none;
            overflow: hidden;
        }
        #rain-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
        #fog-canvas  { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        .win-border {
            position: absolute; inset: 0; z-index: 2;
            border: 18px solid #4a2b06;
            box-shadow: inset 0 0 0 5px #6b3f0d,
                        inset 0 0 60px rgba(0,0,0,0.5),
                        0 0 0 4px #2e1a04;
        }
        .win-bar-v {
            position: absolute; left: calc(50% - 8px); top: 0; bottom: 0;
            width: 16px; background: #4a2b06; z-index: 2;
            box-shadow: 3px 0 8px rgba(0,0,0,0.5), -3px 0 8px rgba(0,0,0,0.5);
        }
        .win-bar-h {
            position: absolute; top: calc(50% - 8px); left: 0; right: 0;
            height: 16px; background: #4a2b06; z-index: 2;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5), 0 -3px 8px rgba(0,0,0,0.5);
        }
        /* subtle glass gloss on each pane */
        .win-gloss {
            position: absolute; z-index: 3;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
            pointer-events: none;
        }
        .win-gloss-tl { top: 18px; left: 18px; right: calc(50% + 8px); bottom: calc(50% + 8px); }
        .win-gloss-tr { top: 18px; left: calc(50% + 8px); right: 18px; bottom: calc(50% + 8px); }
        .win-gloss-bl { top: calc(50% + 8px); left: 18px; right: calc(50% + 8px); bottom: 18px; }
        .win-gloss-br { top: calc(50% + 8px); left: calc(50% + 8px); right: 18px; bottom: 18px; }

        #rag-cursor {
            position: fixed;
            width: 88px; height: 88px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255,255,255,0.28) 0%,
                rgba(220,235,255,0.12) 55%,
                transparent 100%);
            border: 2px dashed rgba(255,255,255,0.55);
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 45;
            box-shadow: 0 0 12px rgba(100,181,246,0.3);
        }

        /* ── REST ── */
        #screen-rest { gap: 20px; }
        .rest-emoji { font-size: 4rem; }
        .rest-label { font-size: 1.1rem; color: rgba(255,255,255,0.5); font-weight: 600; }
        .rest-timer {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00e5ff, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .rest-next { font-size: 0.85rem; color: rgba(255,255,255,0.4); }
        .btn-skip {
            padding: 12px 36px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-skip:hover { background: rgba(255,255,255,0.08); color: white; }

        /* ── COMPLETE ── */
        #screen-complete { gap: 24px; }
        .complete-emoji { font-size: 4rem; }
        .complete-title { font-size: 1.6rem; font-weight: 900; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 360px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 18px 14px;
            text-align: center;
        }
        .stat-val { font-size: 2rem; font-weight: 900; color: #00e5ff; }
        .stat-lbl { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

        /* ── MONITOR ── */
        #monitor-window {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 105px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(0,229,255,0.25);
            border-radius: 12px;
            overflow: hidden;
            z-index: 20;
        }
        @media (min-width: 768px) {
            #monitor-window {
                left: 20px;
                transform: none;
                width: 180px;
                height: 135px;
            }
        }
        #webcam-raw {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #hand-canvas {
            position: absolute;
            width: 100%; height: 100%;
            transform: scaleX(-1);
        }

        /* ── OVERLAYS ── */
        #particle-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 30;
        }
        #trail-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen">
    <div class="spinner"></div>
    <p class="loading-text">正在初始化摄像头…</p>
</div>

<!-- WELCOME -->
<div id="screen-welcome" class="screen hidden">
    <p class="app-title">DeskBreak</p>
    <p class="app-subtitle">上班族放松操 · 手势计数</p>
    <div class="exercise-grid">
        <div class="ex-card" style="border-color:rgba(255,107,53,0.35)" onclick="startSingle(0)">
            <span class="ex-card-icon">✊</span>
            <span class="ex-card-name" style="color:#ff6b35">握拳松开</span>
            <span class="ex-card-reps">× 15 次</span>
            <span class="ex-card-hint">点击单独练习</span>
        </div>
        <div class="ex-card" style="border-color:rgba(124,77,255,0.35)" onclick="startSingle(1)">
            <span class="ex-card-icon">🌀</span>
            <span class="ex-card-name" style="color:#7c4dff">手腕绕圈</span>
            <span class="ex-card-reps">× 10 次</span>
            <span class="ex-card-hint">点击单独练习</span>
        </div>
        <div class="ex-card" style="border-color:rgba(0,188,212,0.35)" onclick="startSingle(2)">
            <span class="ex-card-icon">🙌</span>
            <span class="ex-card-name" style="color:#00bcd4">举手过头</span>
            <span class="ex-card-reps">× 12 次</span>
            <span class="ex-card-hint">点击单独练习</span>
        </div>
        <div class="ex-card" style="border-color:rgba(76,175,80,0.35)" onclick="startSingle(3)">
            <span class="ex-card-icon">🖐</span>
            <span class="ex-card-name" style="color:#4caf50">五指伸展</span>
            <span class="ex-card-reps">× 20 次</span>
            <span class="ex-card-hint">点击单独练习</span>
        </div>
        <!-- 擦玻璃：宽卡片横跨两列 -->
        <div class="ex-card" style="border-color:rgba(100,181,246,0.4); grid-column:1/-1; flex-direction:row; align-items:center; gap:14px" onclick="startSingle(4)">
            <span class="ex-card-icon" style="font-size:2rem;flex-shrink:0">🪟</span>
            <div style="flex:1">
                <div class="ex-card-name" style="color:#64b5f6">擦玻璃</div>
                <div class="ex-card-reps">× 10 次 &nbsp;·&nbsp; 握拳左右擦拭</div>
            </div>
            <span class="ex-card-hint" style="margin:0;flex-shrink:0">点击单独练习 →</span>
        </div>
    </div>
    <div class="welcome-divider">或</div>
    <button class="btn-combo" onclick="startSession()">🏋️ 组合训练 — 全部 5 项</button>
</div>

<!-- EXERCISE -->
<div id="screen-exercise" class="screen hidden">
    <div class="session-dots" id="session-dots"></div>
    <div class="ex-header">
        <div class="ex-icon-wrap" id="ex-icon">✊</div>
        <div class="ex-name" id="ex-name">握拳松开</div>
        <div class="ex-name-en" id="ex-name-en">Hand Open / Close</div>
    </div>
    <div class="ring-wrap" onclick="manualCount()">
        <svg viewBox="0 0 190 190" width="190" height="190">
            <circle class="ring-bg" cx="95" cy="95" r="82" fill="none" stroke-width="10"/>
            <circle class="ring-fg" id="ring-fg" cx="95" cy="95" r="82" fill="none" stroke-width="10"
                    stroke-dasharray="515" stroke-dashoffset="515" stroke="#ff6b35"/>
        </svg>
        <div class="ring-center">
            <div class="rep-count" id="rep-count" style="color:#ff6b35">0</div>
            <div class="rep-goal" id="rep-goal">/ 15</div>
        </div>
    </div>
    <p class="tap-hint">点击计数区手动记录</p>
    <div class="tip-box" id="tip-box">握紧拳头再完全张开</div>
    <div class="hand-status hand-no" id="hand-status">请将手放入摄像头范围</div>
    <div class="next-preview" id="next-preview"></div>
</div>

<!-- REST -->
<div id="screen-rest" class="screen hidden">
    <div class="rest-emoji">😮‍💨</div>
    <div class="rest-label">休息一下</div>
    <div class="rest-timer" id="rest-timer">20</div>
    <div class="rest-next" id="rest-next">下一个：手腕绕圈</div>
    <button class="btn-skip" onclick="skipRest()">跳过休息 →</button>
</div>

<!-- COMPLETE -->
<div id="screen-complete" class="screen hidden">
    <div class="complete-emoji" id="complete-emoji">🎉</div>
    <div class="complete-title" id="complete-title">完成！太棒了</div>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-val" id="stat-reps">0</div>
            <div class="stat-lbl">完成次数</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-exs">4</div>
            <div class="stat-lbl">完成项目</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-mins">0</div>
            <div class="stat-lbl">用时(分钟)</div>
        </div>
        <div class="stat-card">
            <div class="stat-val">🏅</div>
            <div class="stat-lbl">加油继续</div>
        </div>
    </div>
    <button class="btn-start" onclick="restartSession()">再练一次</button>
    <button class="btn-combo" style="margin-top:4px" onclick="showScreen('screen-welcome')">返回选择</button>
</div>

<!-- CANVASES -->
<canvas id="particle-canvas"></canvas>
<canvas id="trail-canvas"></canvas>

<!-- GLASS OVERLAY (rain scene + fog, z-index:6, between trail and screens) -->
<div id="glass-overlay">
    <canvas id="rain-canvas"></canvas>
    <canvas id="fog-canvas"></canvas>
    <div class="win-border"></div>
    <div class="win-bar-v"></div>
    <div class="win-bar-h"></div>
    <div class="win-gloss win-gloss-tl"></div>
    <div class="win-gloss win-gloss-tr"></div>
    <div class="win-gloss win-gloss-bl"></div>
    <div class="win-gloss win-gloss-br"></div>
</div>

<!-- RAG CURSOR (hand cloth indicator, z-index:45) -->
<div id="rag-cursor"></div>

<!-- MONITOR -->
<div id="monitor-window">
    <video id="webcam-raw" playsinline muted></video>
    <canvas id="hand-canvas"></canvas>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   EXERCISES CONFIG
═══════════════════════════════════════════════ */
const EXERCISES = [
    { id: 'fist_pump',    name: '握拳松开',   nameEn: 'Hand Open / Close', icon: '✊', iconAnim: 'anim-fist',    color: '#ff6b35', reps: 15, tip: '握紧拳头再完全张开' },
    { id: 'hand_circle',  name: '手腕绕圈',   nameEn: 'Wrist Circles',      icon: '🌀', iconAnim: 'anim-circle',  color: '#7c4dff', reps: 10, tip: '用手腕画大圆圈' },
    { id: 'overhead',     name: '举手过头',   nameEn: 'Overhead Reach',     icon: '🙌', iconAnim: 'anim-overhead',color: '#00bcd4', reps: 12, tip: '举手超过头顶后放下' },
    { id: 'finger_spread',name: '五指伸展',   nameEn: 'Finger Spread',      icon: '🖐', iconAnim: 'anim-spread',  color: '#4caf50', reps: 20, tip: '五指张开后合拢' },
    { id: 'wipe_glass',   name: '擦玻璃',    nameEn: 'Wipe the Glass',     icon: '🪟', iconAnim: 'anim-wipe',    color: '#64b5f6', reps: 10, tip: '握紧拳头，左右擦拭玻璃' },
];
const CIRCUMFERENCE = 515;
const REST_DURATION = 20;

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let currentScreen   = 'loading';
let currentExIdx    = 0;
let currentReps     = 0;
let detector        = null;
let restTimerId     = null;
let restRemaining   = REST_DURATION;
let sessionStart    = null;
let audioCtx        = null;
let trailPoints     = [];

// 双手举头状态机
let overheadState    = 'idle'; // 'idle' | 'both_high'
let overheadCooldown = 0;

// 训练模式
let singleMode = false; // true = 单项练习，false = 组合训练

/* ═══════════════════════════════════════════════
   EXERCISE DETECTOR
═══════════════════════════════════════════════ */
class ExerciseDetector {
    constructor(type) {
        this.type = type;
        this.state = 'idle';
        this.history = [];
        this.lastAngle = null;
        this.totalAngle = 0;
        this.cooldown = 0;
        this.smoothX = null;
        this.smoothY = null;
    }
    detect(landmarks) {
        if (this.cooldown > 0) { this.cooldown--; return false; }
        switch (this.type) {
            case 'fist_pump':    return this._fistPump(landmarks);
            case 'hand_circle':  return this._handCircle(landmarks);
            case 'overhead':     return this._overhead(landmarks);
            case 'finger_spread':return this._fingerSpread(landmarks);
        }
        return false;
    }
    _fistPump(lm) {
        const palm = lm[0];
        let dist = 0;
        [8,12,16,20].forEach(id => dist += Math.hypot(lm[id].x - palm.x, lm[id].y - palm.y));
        const score = dist / 4;
        if (score < 0.17 && this.state !== 'closed') {
            this.state = 'closed';
        } else if (score > 0.36 && this.state === 'closed') {
            this.state = 'open';
            this.cooldown = 18;
            return true;
        }
        return false;
    }
    _handCircle(lm) {
        const wrist = lm[0];
        this.smoothX = this.smoothX !== null ? this.smoothX * 0.6 + wrist.x * 0.4 : wrist.x;
        this.smoothY = this.smoothY !== null ? this.smoothY * 0.6 + wrist.y * 0.4 : wrist.y;
        const now = Date.now();
        this.history.push({ x: this.smoothX, y: this.smoothY, t: now });
        this.history = this.history.filter(p => now - p.t < 2500);
        if (this.history.length < 20) return false;

        let cx = 0, cy = 0;
        this.history.forEach(p => { cx += p.x; cy += p.y; });
        cx /= this.history.length; cy /= this.history.length;

        let maxR = 0;
        this.history.forEach(p => { const d = Math.hypot(p.x-cx, p.y-cy); if (d > maxR) maxR = d; });
        if (maxR < 0.06) { this.lastAngle = null; this.totalAngle = 0; return false; }

        const latest = this.history[this.history.length - 1];
        const angle = Math.atan2(latest.y - cy, latest.x - cx);
        if (this.lastAngle !== null) {
            let delta = angle - this.lastAngle;
            if (delta > Math.PI) delta -= Math.PI * 2;
            if (delta < -Math.PI) delta += Math.PI * 2;
            this.totalAngle += delta;
            if (Math.abs(this.totalAngle) >= Math.PI * 2) {
                this.totalAngle = 0;
                this.lastAngle = null;
                this.history = [];
                this.smoothX = null;
                this.smoothY = null;
                this.cooldown = 20;
                return true;
            }
        }
        this.lastAngle = angle;
        return false;
    }
    _overhead(lm) {
        const wrist = lm[0];
        if (wrist.y < 0.28 && this.state !== 'high') {
            this.state = 'high';
        } else if (wrist.y > 0.55 && this.state === 'high') {
            this.state = 'low';
            this.cooldown = 25;
            return true;
        }
        return false;
    }
    _fingerSpread(lm) {
        const spread = Math.hypot(lm[20].x - lm[8].x, lm[20].y - lm[8].y);
        if (spread > 0.23 && this.state !== 'spread') {
            this.state = 'spread';
        } else if (spread < 0.09 && this.state === 'spread') {
            this.state = 'closed';
            this.cooldown = 12;
            return true;
        }
        return false;
    }
}

/* ═══════════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════════ */
const particleCanvas = document.getElementById('particle-canvas');
const pCtx = particleCanvas.getContext('2d');
let particles = [];

function resizeParticleCanvas() {
    particleCanvas.width  = window.innerWidth;
    particleCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeParticleCanvas);
resizeParticleCanvas();

function burstParticles(color) {
    const cx = particleCanvas.width / 2;
    const cy = particleCanvas.height / 2;
    for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 7;
        particles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            alpha: 1,
            size: 4 + Math.random() * 6,
            color,
        });
    }
    if (!animFrameId) animParticles();
}

let animFrameId = null;
function animParticles() {
    pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
    particles = particles.filter(p => p.alpha > 0.01);
    particles.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.3;   // gravity
        p.alpha *= 0.92;
        pCtx.save();
        pCtx.globalAlpha = p.alpha;
        pCtx.fillStyle = p.color;
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
        pCtx.fill();
        pCtx.restore();
    });
    if (particles.length > 0) {
        animFrameId = requestAnimationFrame(animParticles);
    } else {
        animFrameId = null;
    }
}

/* ═══════════════════════════════════════════════
   TRAIL
═══════════════════════════════════════════════ */
const trailCanvas = document.getElementById('trail-canvas');
const tCtx = trailCanvas.getContext('2d');

function resizeTrailCanvas() {
    trailCanvas.width  = window.innerWidth;
    trailCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeTrailCanvas);
resizeTrailCanvas();

function clearTrail() {
    trailPoints = [];
    tCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
}

function drawTrail(nx, ny, color) {
    // Convert normalized [0,1] to screen coords
    const x = (1 - nx) * trailCanvas.width;  // mirrored
    const y = ny * trailCanvas.height;
    const now = Date.now();
    trailPoints.push({ x, y, t: now });
    trailPoints = trailPoints.filter(p => now - p.t < 2500);
    tCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
    if (trailPoints.length < 2) return;
    for (let i = 1; i < trailPoints.length; i++) {
        const alpha = (i / trailPoints.length) * 0.7;
        tCtx.beginPath();
        tCtx.moveTo(trailPoints[i-1].x, trailPoints[i-1].y);
        tCtx.lineTo(trailPoints[i].x,   trailPoints[i].y);
        tCtx.strokeStyle = color;
        tCtx.globalAlpha = alpha;
        tCtx.lineWidth = 3;
        tCtx.lineCap = 'round';
        tCtx.stroke();
    }
    tCtx.globalAlpha = 1;
}

/* ════════════════��══════════════════════════════
   AUDIO
═══════════════════════════════════════════════ */
function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
}
document.addEventListener('click', ensureAudio, { once: true });

function playBleep() {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    } catch(e) {}
}

/* ═══════════════════════════════════════════════
   GLASS EXERCISE — RAIN + FOG + WIPE
═══════════════════════════════════════════════ */
const RAG_RADIUS    = 55;   // fog erase radius (px)
const REFOG_DELAY   = 3500; // ms between gentle re-fog passes

let rainCtx         = null;
let fogCtx          = null;
let rainDrops       = [];
let glassBuildings  = [];   // pre-generated cityscape
let rainAnimId      = null;
let lastRefogTime   = 0;
let glassReady      = false;

// Sweep detection state
let wipeSwipeState  = 'none'; // 'none'|'at_left'|'at_right'

function initGlassExercise() {
    const rc = document.getElementById('rain-canvas');
    const fc = document.getElementById('fog-canvas');
    rc.width = fc.width  = window.innerWidth;
    rc.height = fc.height = window.innerHeight;
    rainCtx = rc.getContext('2d');
    fogCtx  = fc.getContext('2d');

    // Pre-generate stable city silhouette
    glassBuildings = [];
    const W = rc.width, H = rc.height;
    let bx = 0;
    while (bx < W) {
        const bw  = W * (0.06 + Math.random() * 0.11);
        const top = H * (0.38 + Math.random() * 0.30);
        const wins = [];
        for (let wy = top + 10; wy < H - 12; wy += 20) {
            for (let wx = bx + 5; wx < bx + bw - 5; wx += 15) {
                wins.push({ x: wx, y: wy, lit: Math.random() > 0.35 });
            }
        }
        glassBuildings.push({ x: bx, top, width: bw, wins });
        bx += bw + Math.random() * 4;
    }
    applyFog(1.0);
    glassReady = true;
}

function applyFog(alpha) {
    if (!fogCtx) return;
    const W = fogCtx.canvas.width, H = fogCtx.canvas.height;
    fogCtx.globalCompositeOperation = 'source-over';

    // Base condensation layer
    fogCtx.fillStyle = `rgba(185, 208, 228, ${alpha * 0.88})`;
    fogCtx.fillRect(0, 0, W, H);

    // Drip streaks for realism
    if (alpha > 0.4) {
        for (let i = 0; i < 22; i++) {
            const sx = Math.random() * W;
            const sy = Math.random() * H * 0.65;
            const sh = 35 + Math.random() * 90;
            const sw = 0.6 + Math.random() * 1.8;
            const g  = fogCtx.createLinearGradient(sx, sy, sx, sy + sh);
            g.addColorStop(0, `rgba(155,188,218,${alpha * 0.75})`);
            g.addColorStop(0.7, `rgba(155,188,218,${alpha * 0.25})`);
            g.addColorStop(1,  'rgba(155,188,218,0)');
            fogCtx.fillStyle = g;
            fogCtx.fillRect(sx, sy, sw, sh);
        }
    }
}

function wipeAt(screenX, screenY) {
    if (!fogCtx) return;
    fogCtx.globalCompositeOperation = 'destination-out';
    const g = fogCtx.createRadialGradient(screenX, screenY, 0, screenX, screenY, RAG_RADIUS);
    g.addColorStop(0,   'rgba(0,0,0,1)');
    g.addColorStop(0.65,'rgba(0,0,0,0.9)');
    g.addColorStop(1,   'rgba(0,0,0,0)');
    fogCtx.fillStyle = g;
    fogCtx.beginPath();
    fogCtx.arc(screenX, screenY, RAG_RADIUS, 0, Math.PI * 2);
    fogCtx.fill();
    fogCtx.globalCompositeOperation = 'source-over';
}

function drawRainFrame() {
    if (!rainCtx) return;
    const W = rainCtx.canvas.width, H = rainCtx.canvas.height;

    // Night sky gradient
    const sky = rainCtx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#05111e');
    sky.addColorStop(1, '#0b1e2f');
    rainCtx.fillStyle = sky;
    rainCtx.fillRect(0, 0, W, H);

    // City silhouette
    rainCtx.fillStyle = '#081420';
    glassBuildings.forEach(b => {
        rainCtx.fillRect(b.x, b.top, b.width, H - b.top);
        b.wins.forEach(w => {
            rainCtx.fillStyle = w.lit
                ? `rgba(255,240,140,${0.25 + Math.random() * 0.15})`
                : 'rgba(255,240,140,0.03)';
            rainCtx.fillRect(w.x, w.y, 6, 9);
        });
        rainCtx.fillStyle = '#081420';
    });

    // Rain drops
    rainDrops.forEach(d => {
        rainCtx.beginPath();
        rainCtx.moveTo(d.x, d.y);
        rainCtx.lineTo(d.x - d.len * 0.18, d.y + d.len);
        rainCtx.strokeStyle = `rgba(175,205,235,${d.op})`;
        rainCtx.lineWidth = d.w;
        rainCtx.stroke();
        d.y += d.speed;
        d.x -= d.speed * 0.12;
        if (d.y > H + d.len) { d.y = -d.len; d.x = Math.random() * W; }
        if (d.x < -10)        { d.x = W + 10; }
    });
}

function animateGlass() {
    if (EXERCISES[currentExIdx]?.id !== 'wipe_glass' || currentScreen !== 'exercise') {
        rainAnimId = null;
        return;
    }
    drawRainFrame();

    // Periodic gentle re-fog so the exercise stays fresh
    if (Date.now() - lastRefogTime > REFOG_DELAY) {
        applyFog(0.22);
        lastRefogTime = Date.now();
    }
    rainAnimId = requestAnimationFrame(animateGlass);
}

function showGlassOverlay() {
    const ol = document.getElementById('glass-overlay');
    ol.style.display = 'block';
    wipeSwipeState = 'none';
    lastRefogTime  = Date.now();

    if (!glassReady) {
        initGlassExercise();
    } else {
        // Resize if viewport changed
        const rc = document.getElementById('rain-canvas');
        const fc = document.getElementById('fog-canvas');
        if (rc.width !== window.innerWidth || rc.height !== window.innerHeight) {
            rc.width = fc.width  = window.innerWidth;
            rc.height = fc.height = window.innerHeight;
        }
        applyFog(1.0); // re-fog for fresh session
    }

    // Spawn rain drops
    rainDrops = [];
    for (let i = 0; i < 130; i++) {
        rainDrops.push({
            x:     Math.random() * window.innerWidth,
            y:     Math.random() * window.innerHeight,
            len:   12 + Math.random() * 22,
            speed: 6  + Math.random() * 10,
            op:    0.3 + Math.random() * 0.5,
            w:     0.7 + Math.random() * 1.2,
        });
    }
    if (!rainAnimId) animateGlass();
}

function hideGlassOverlay() {
    document.getElementById('glass-overlay').style.display = 'none';
    document.getElementById('rag-cursor').style.display    = 'none';
    if (rainAnimId) { cancelAnimationFrame(rainAnimId); rainAnimId = null; }
}

// Called from onResults when exercise is wipe_glass
function processWipeGesture(lm) {
    // Palm center = average of key palm landmarks
    const palmIds = [0, 5, 9, 13, 17];
    let px = 0, py = 0;
    palmIds.forEach(id => { px += lm[id].x; py += lm[id].y; });
    px /= palmIds.length;
    py /= palmIds.length;

    // Closed-fist detection
    const palm = lm[0];
    let dist = 0;
    [8, 12, 16, 20].forEach(id => dist += Math.hypot(lm[id].x - palm.x, lm[id].y - palm.y));
    const isFist = (dist / 4) < 0.20;

    const rag = document.getElementById('rag-cursor');

    // Convert normalised → screen coords (mirrored to match display)
    const sx = (1 - px) * window.innerWidth;
    const sy = py * window.innerHeight;

    if (isFist) {
        rag.style.display = 'block';
        rag.style.left    = sx + 'px';
        rag.style.top     = sy + 'px';
        wipeAt(sx, sy);

        // Sweep rep counting: left zone(x<0.25) ↔ right zone(x>0.75) — mirrored x
        const mirX = 1 - px;
        if (mirX < 0.25 && wipeSwipeState !== 'at_left') {
            if (wipeSwipeState === 'at_right' && currentReps < EXERCISES[currentExIdx].reps) countRep();
            wipeSwipeState = 'at_left';
        } else if (mirX > 0.75 && wipeSwipeState !== 'at_right') {
            if (wipeSwipeState === 'at_left' && currentReps < EXERCISES[currentExIdx].reps) countRep();
            wipeSwipeState = 'at_right';
        }
    } else {
        rag.style.display = 'none';
    }

    // Dynamic tip
    document.getElementById('tip-box').textContent =
        isFist ? '擦拭中… 左右扫动计一次' : '握紧拳头，左右擦拭玻璃';
}

/* ═══════════════════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════════════════ */
function showScreen(id) {
    currentScreen = id.replace('screen-', '');
    document.querySelectorAll('.screen').forEach(s => {
        s.classList.toggle('hidden', s.id !== id);
    });
}

/* ═══════════════════════════════════════════════
   SESSION LOGIC
═══════════════════════════════════════════════ */
function startSession() {
    ensureAudio();
    singleMode   = false;
    currentExIdx = 0;
    sessionStart = Date.now();
    loadExercise(0);
}

function startSingle(idx) {
    ensureAudio();
    singleMode   = true;
    currentExIdx = idx;
    sessionStart = Date.now();
    loadExercise(idx);
}

function loadExercise(idx) {
    currentReps = 0;
    const ex = EXERCISES[idx];
    detector = new ExerciseDetector(ex.id);
    clearTrail();

    // Update dots（单项模式不显示）
    const dotsEl = document.getElementById('session-dots');
    if (singleMode) {
        dotsEl.innerHTML = '';
    } else {
        dotsEl.innerHTML = EXERCISES.map((_, i) => {
            let cls = 'dot';
            if (i < idx) cls += ' done';
            if (i === idx) cls += ' current';
            return `<div class="${cls}"></div>`;
        }).join('');
    }

    // Update header
    const iconEl = document.getElementById('ex-icon');
    iconEl.textContent = ex.icon;
    iconEl.className = 'ex-icon-wrap ' + ex.iconAnim;
    document.getElementById('ex-name').textContent   = ex.name;
    document.getElementById('ex-name-en').textContent = ex.nameEn;
    document.getElementById('ex-name').style.color    = ex.color;

    // Ring
    document.getElementById('ring-fg').style.stroke           = ex.color;
    document.getElementById('ring-fg').style.strokeDashoffset  = CIRCUMFERENCE;
    document.getElementById('rep-count').textContent = '0';
    document.getElementById('rep-count').style.color  = ex.color;
    document.getElementById('rep-goal').textContent   = `/ ${ex.reps}`;

    // Tip
    document.getElementById('tip-box').textContent = ex.tip;

    // 重置举手状态机
    overheadState    = 'idle';
    overheadCooldown = 0;

    // Skeleton color (via CSS variable)
    skeletonColor = ex.color;

    // 玻璃擦除 overlay
    if (ex.id === 'wipe_glass') {
        showGlassOverlay();
    } else {
        hideGlassOverlay();
    }

    // Next preview（单项模式不显示）
    const nextPreviewEl = document.getElementById('next-preview');
    if (singleMode) {
        nextPreviewEl.textContent = '单项练习模式';
    } else {
        const next = EXERCISES[idx + 1];
        nextPreviewEl.textContent = next
            ? `下一个：${next.icon} ${next.name}` : '这是最后一项';
    }

    showScreen('screen-exercise');
}

function countRep() {
    const ex = EXERCISES[currentExIdx];
    currentReps++;
    playBleep();
    burstParticles(ex.color);

    // Update counter
    const countEl = document.getElementById('rep-count');
    countEl.textContent = currentReps;
    countEl.classList.remove('pop');
    void countEl.offsetWidth;
    countEl.classList.add('pop');

    // Ring progress
    const progress = Math.min(currentReps / ex.reps, 1);
    document.getElementById('ring-fg').style.strokeDashoffset =
        CIRCUMFERENCE * (1 - progress);

    if (currentReps >= ex.reps) {
        setTimeout(() => advanceExercise(), 500);
    }
}

function manualCount() {
    if (currentScreen !== 'exercise') return;
    if (currentReps < EXERCISES[currentExIdx].reps) countRep();
}

function advanceExercise() {
    hideGlassOverlay();
    if (singleMode) {
        showComplete();
        return;
    }
    const nextIdx = currentExIdx + 1;
    if (nextIdx >= EXERCISES.length) {
        showComplete();
    } else {
        currentExIdx = nextIdx;
        startRest();
    }
}

function startRest() {
    clearTrail();
    restRemaining = REST_DURATION;
    const next = EXERCISES[currentExIdx];
    document.getElementById('rest-timer').textContent = REST_DURATION;
    document.getElementById('rest-next').textContent  = `下一个：${next.icon} ${next.name}`;
    showScreen('screen-rest');
    restTimerId = setInterval(() => {
        restRemaining--;
        document.getElementById('rest-timer').textContent = restRemaining;
        if (restRemaining <= 0) {
            clearInterval(restTimerId);
            restTimerId = null;
            loadExercise(currentExIdx);
        }
    }, 1000);
}

function skipRest() {
    if (restTimerId) { clearInterval(restTimerId); restTimerId = null; }
    loadExercise(currentExIdx);
}

function showComplete() {
    const elapsed = Math.round((Date.now() - sessionStart) / 60000);
    const ex = EXERCISES[currentExIdx];

    if (singleMode) {
        document.getElementById('complete-emoji').textContent  = ex.icon;
        document.getElementById('complete-title').textContent  = `${ex.name} · 完成！`;
        document.getElementById('stat-reps').textContent = ex.reps;
        document.getElementById('stat-exs').textContent  = 1;
    } else {
        document.getElementById('complete-emoji').textContent  = '🎉';
        document.getElementById('complete-title').textContent  = '全程完成！太棒了';
        document.getElementById('stat-reps').textContent = EXERCISES.reduce((s, e) => s + e.reps, 0);
        document.getElementById('stat-exs').textContent  = EXERCISES.length;
    }
    document.getElementById('stat-mins').textContent = Math.max(elapsed, 1);
    hideGlassOverlay();
    showScreen('screen-complete');
    clearTrail();
}

function restartSession() {
    // 单项模式：重新开始同一项；组合模式：从头开始
    if (singleMode) {
        startSingle(currentExIdx);
    } else {
        startSession();
    }
}

/* ═══════════════════════════════════════════════
   MEDIAPIPE
═══════════════════════════════════════════════ */
const video     = document.getElementById('webcam-raw');
const handCanvas = document.getElementById('hand-canvas');
const hCtx       = handCanvas.getContext('2d');
let skeletonColor = '#ff6b35';

function resizeHandCanvas() {
    const mon = document.getElementById('monitor-window');
    handCanvas.width  = mon.offsetWidth;
    handCanvas.height = mon.offsetHeight;
}
window.addEventListener('resize', resizeHandCanvas);

function onResults(results) {
    hCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);

    const allLandmarks  = results.multiHandLandmarks  || [];
    const allHandedness = results.multiHandedness      || [];

    // 构建 { 'Left': landmarks, 'Right': landmarks }
    const handsMap = {};
    allLandmarks.forEach((lm, i) => {
        const label = allHandedness[i]?.label; // "Left" | "Right"
        if (label) handsMap[label] = lm;
    });

    // 绘制所有检测到的手的骨架
    allLandmarks.forEach((lm) => {
        if (window.drawConnectors && window.drawLandmarks) {
            drawConnectors(hCtx, lm, window.HAND_CONNECTIONS,
                { color: skeletonColor, lineWidth: 2 });
            drawLandmarks(hCtx, lm,
                { color: skeletonColor, radius: 2 });
        }
    });

    // 更新手部状态指示器
    const labels = allHandedness.map(h => h?.label).filter(Boolean);
    updateHandStatus(allLandmarks.length, labels);

    if (currentScreen !== 'exercise' || !detector) return;

    const ex = EXERCISES[currentExIdx];

    if (ex.id === 'overhead') {
        // 举手过头：需要双手同时，单独处理
        handleOverheadDetection(handsMap);
    } else if (ex.id === 'wipe_glass') {
        // 擦玻璃：取任意一只手，用掌心位置驱动抹布
        const lm = allLandmarks[0];
        if (lm) {
            processWipeGesture(lm);
        } else {
            document.getElementById('rag-cursor').style.display = 'none';
            document.getElementById('tip-box').textContent = '请将手放入摄像头，张开手掌擦拭';
        }
    } else {
        // 其他动作：取第一只检测到的手即可
        const lm = allLandmarks[0];
        if (!lm) return;
        if (ex.id === 'hand_circle') {
            drawTrail(lm[0].x, lm[0].y, ex.color);
        }
        const counted = detector.detect(lm);
        if (counted && currentReps < ex.reps) countRep();
    }
}

function updateHandStatus(count, labels) {
    const el = document.getElementById('hand-status');
    const ex = EXERCISES[currentExIdx];
    const isOverhead = ex?.id === 'overhead';

    if (count === 0) {
        el.textContent = isOverhead ? '请将双手放入摄像头范围' : '请将手放入摄像头范围';
        el.className = 'hand-status hand-no';
    } else if (count === 1) {
        const which = labels[0] === 'Left' ? '左' : '右';
        el.textContent = `✓ ${which}手已检测`;
        // 举手过头要求双手，单手时用黄色警告
        el.className = `hand-status ${isOverhead ? 'hand-half' : 'hand-ok'}`;
    } else {
        el.textContent = '✓ 双手已检测';
        el.className = 'hand-status hand-ok';
    }
}

// 举手过头——双手检测逻辑
function handleOverheadDetection(handsMap) {
    if (overheadCooldown > 0) { overheadCooldown--; return; }

    const leftWrist  = handsMap.Left?.[0];
    const rightWrist = handsMap.Right?.[0];

    const leftHigh  = leftWrist  && leftWrist.y  < 0.28;
    const rightHigh = rightWrist && rightWrist.y < 0.28;
    const leftLow   = leftWrist  && leftWrist.y  > 0.55;
    const rightLow  = rightWrist && rightWrist.y > 0.55;

    const bothHigh = leftHigh && rightHigh;
    const bothLow  = leftLow  && rightLow;

    // 动态引导文字
    let guide;
    if (!leftWrist && !rightWrist) {
        guide = '请将双手放入摄像头，同时举过头顶';
    } else if (!leftWrist) {
        guide = '未检测到左手，请将双手都放入画面';
    } else if (!rightWrist) {
        guide = '未检测到右手，请将双手都放入画面';
    } else if (bothHigh) {
        guide = '🙌 双手已举高！放下时完成计数';
    } else if (leftHigh && !rightHigh) {
        guide = '左手已举起 ✓  请同时举起右手 →';
    } else if (!leftHigh && rightHigh) {
        guide = '← 请同时举起左手  右手已举起 ✓';
    } else {
        guide = '双手同时举过头顶后再放下';
    }
    document.getElementById('tip-box').textContent = guide;

    // 状态机：双手都高 → both_high；之后双手都低 → 计一次
    if (bothHigh && overheadState !== 'both_high') {
        overheadState = 'both_high';
    } else if (overheadState === 'both_high' && bothLow) {
        overheadState    = 'idle';
        overheadCooldown = 25;
        if (currentReps < EXERCISES[currentExIdx].reps) countRep();
    }
}

async function initMediaPipe() {
    const HandsClass  = window.Hands;
    const CameraClass = window.Camera;

    if (!HandsClass || !CameraClass) {
        console.warn('MediaPipe not loaded, showing welcome anyway');
        showScreen('screen-welcome');
        document.getElementById('monitor-window').style.display = 'none';
        return;
    }

    const hands = new HandsClass({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.6,
    });
    hands.onResults(onResults);

    const cam = new CameraClass(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 320, height: 240,
    });

    try {
        await cam.start();
        resizeHandCanvas();
        showScreen('screen-welcome');
    } catch (e) {
        console.warn('Camera failed:', e);
        document.getElementById('monitor-window').style.display = 'none';
        showScreen('screen-welcome');
    }
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
window.addEventListener('load', () => {
    // Small delay so CDN scripts have time to register globals
    setTimeout(initMediaPipe, 600);
});
</script>
